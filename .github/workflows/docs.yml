name: Trigger snaix.homes deploy

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy hook
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::SNAIX_DOCS_DEPLOY_HOOK not set — skipping ping"
            exit 0
          fi
          curl -fsS -X POST "$HOOK"
        env:
          HOOK: ${{ secrets.SNAIX_DOCS_DEPLOY_HOOK }}
